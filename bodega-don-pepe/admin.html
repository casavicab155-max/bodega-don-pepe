<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dona · Superadmin</title>
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<style>
:root {
  --bg:     #0f172a;
  --bg2:    #1e293b;
  --bg3:    #334155;
  --border: #475569;
  --text:   #f1f5f9;
  --text2:  #94a3b8;
  --text3:  #64748b;
  --orange: #f97316;
  --green:  #22c55e;
  --red:    #ef4444;
  --blue:   #3b82f6;
  --yellow: #eab308;
  --radius: 12px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

/* LOGIN */
#login-screen {
  min-height: 100vh; display: flex; align-items: center; justify-content: center;
  background: linear-gradient(135deg, #0f172a, #1e293b);
}
.login-box {
  background: var(--bg2); border: 1px solid var(--border); border-radius: 20px;
  padding: 40px; width: 100%; max-width: 360px; text-align: center;
}
.login-logo { font-size: 48px; margin-bottom: 8px; }
.login-title { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
.login-sub { color: var(--text2); font-size: 13px; margin-bottom: 28px; }
.login-box input {
  width: 100%; padding: 12px 16px; background: var(--bg3); border: 1px solid var(--border);
  border-radius: var(--radius); color: var(--text); font-size: 15px; margin-bottom: 12px;
}
.login-box input:focus { outline: none; border-color: var(--orange); }
.btn-login {
  width: 100%; padding: 13px; background: var(--orange); color: #fff; border: none;
  border-radius: var(--radius); font-size: 15px; font-weight: 700; cursor: pointer;
}
.btn-login:hover { opacity: 0.9; }
#login-error { color: var(--red); font-size: 13px; margin-top: 10px; display: none; }

/* APP */
#app { display: none; }
.topbar {
  background: var(--bg2); border-bottom: 1px solid var(--border);
  padding: 14px 24px; display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 10;
}
.topbar-brand { display: flex; align-items: center; gap: 10px; }
.topbar-logo { font-size: 24px; }
.topbar-title { font-size: 16px; font-weight: 700; }
.topbar-badge { background: var(--orange); color: #fff; font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 20px; }
.topbar-right { display: flex; align-items: center; gap: 12px; }
.btn-refresh {
  background: var(--bg3); border: 1px solid var(--border); color: var(--text);
  padding: 7px 14px; border-radius: 8px; font-size: 13px; cursor: pointer;
}
.btn-refresh:hover { background: var(--border); }
.last-update { color: var(--text3); font-size: 12px; }

.content { padding: 24px; max-width: 1400px; margin: 0 auto; }

/* SECCIÓN */
.section-title {
  font-size: 11px; font-weight: 700; color: var(--text3); text-transform: uppercase;
  letter-spacing: 1px; margin-bottom: 12px; margin-top: 28px;
}
.section-title:first-child { margin-top: 0; }

/* KPI GRID */
.kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; }
.kpi-card {
  background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 18px 20px;
}
.kpi-label { font-size: 11px; color: var(--text2); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
.kpi-value { font-size: 28px; font-weight: 800; line-height: 1; }
.kpi-sub { font-size: 12px; color: var(--text3); margin-top: 4px; }
.kpi-orange { border-left: 3px solid var(--orange); }
.kpi-green  { border-left: 3px solid var(--green); }
.kpi-blue   { border-left: 3px solid var(--blue); }
.kpi-yellow { border-left: 3px solid var(--yellow); }
.kpi-red    { border-left: 3px solid var(--red); }

/* TABLA DE TIENDAS */
.table-wrap { overflow-x: auto; border-radius: var(--radius); border: 1px solid var(--border); }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
thead { background: var(--bg3); }
th { padding: 11px 14px; text-align: left; font-size: 11px; font-weight: 700; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; white-space: nowrap; }
td { padding: 12px 14px; border-top: 1px solid var(--border); vertical-align: middle; }
tr:hover td { background: rgba(255,255,255,0.02); }
.tienda-nombre { font-weight: 600; color: var(--text); }
.tienda-admin  { font-size: 11px; color: var(--text3); margin-top: 2px; }

.badge {
  display: inline-block; padding: 2px 8px; border-radius: 20px;
  font-size: 11px; font-weight: 700; text-transform: uppercase;
}
.badge-basico  { background: rgba(100,116,139,0.2); color: var(--text2); }
.badge-pro     { background: rgba(59,130,246,0.2);  color: var(--blue); }
.badge-negocio { background: rgba(249,115,22,0.2);  color: var(--orange); }
.badge-activa  { background: rgba(34,197,94,0.15);  color: var(--green); }
.badge-inactiva{ background: rgba(239,68,68,0.15);  color: var(--red); }

.stat-num { font-weight: 700; color: var(--text); }
.stat-monto { font-weight: 700; color: var(--green); }
.stat-ia { color: var(--blue); font-weight: 600; }
.stat-fiado { color: var(--yellow); }

/* GRID INFERIOR */
.bottom-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
@media (max-width: 900px) { .bottom-grid { grid-template-columns: 1fr; } }

.card {
  background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px;
}
.card-title { font-size: 13px; font-weight: 700; margin-bottom: 16px; color: var(--text); }

/* ACTIVIDAD */
.actividad-item {
  display: flex; justify-content: space-between; align-items: flex-start;
  padding: 9px 0; border-bottom: 1px solid var(--border); font-size: 12px;
}
.actividad-item:last-child { border-bottom: none; }
.actividad-left { flex: 1; }
.actividad-tienda { font-weight: 600; color: var(--text); }
.actividad-tipo { color: var(--text3); font-size: 11px; margin-top: 1px; }
.actividad-right { text-align: right; }
.actividad-monto { font-weight: 700; color: var(--green); }
.actividad-hora { color: var(--text3); font-size: 11px; margin-top: 1px; }

/* FEATURES */
.feature-bar { margin-bottom: 14px; }
.feature-label { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 5px; }
.feature-track { background: var(--bg3); border-radius: 4px; height: 8px; overflow: hidden; }
.feature-fill { height: 100%; border-radius: 4px; transition: width 0.6s ease; }

/* SPINNER */
.spinner-wrap { display: flex; align-items: center; justify-content: center; min-height: 200px; }
.spinner { width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: var(--orange); border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

.empty { color: var(--text3); font-size: 13px; text-align: center; padding: 30px; }

/* Rankings */
.rankings-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; }
.ranking-card {
  background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px;
}
.ranking-title { font-size: 11px; font-weight: 700; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 12px; }
.podio-item {
  display: flex; align-items: center; gap: 10px; padding: 7px 0;
  border-bottom: 1px solid var(--border);
}
.podio-item:last-child { border-bottom: none; }
.podio-pos { font-size: 18px; width: 28px; text-align: center; flex-shrink: 0; }
.podio-info { flex: 1; min-width: 0; }
.podio-nombre { font-size: 13px; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.podio-valor { font-size: 11px; color: var(--text3); margin-top: 1px; }
.podio-badge { font-size: 12px; font-weight: 700; flex-shrink: 0; }

/* TABS */
.tab-nav { display:flex; gap:6px; }
.tab-btn {
  padding:6px 16px; border-radius:8px; border:1px solid var(--border);
  background:transparent; color:var(--text2); font-size:13px; font-weight:600; cursor:pointer;
}
.tab-btn.active { background:var(--orange); color:#fff; border-color:var(--orange); }
.tab-btn:hover:not(.active) { background:var(--bg3); color:var(--text); }

/* CATÁLOGO */
.cat-card { background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius); padding:20px; }
.cat-form label { display:block; font-size:11px; color:var(--text2); font-weight:600; text-transform:uppercase; letter-spacing:.04em; margin-bottom:5px; margin-top:14px; }
.cat-form input, .cat-form select {
  width:100%; padding:10px 12px; background:var(--bg3); border:1px solid var(--border);
  border-radius:8px; color:var(--text); font-size:14px;
}
.cat-form input:focus, .cat-form select:focus { outline:none; border-color:var(--orange); }
.cat-form select option { background:var(--bg3); }
.btn-scan {
  display:flex; align-items:center; gap:8px; padding:11px 20px;
  background:var(--blue); color:#fff; border:none; border-radius:10px;
  font-size:14px; font-weight:700; cursor:pointer; width:100%; justify-content:center;
}
.btn-scan:hover { opacity:.9; }
.btn-guardar {
  width:100%; padding:13px; background:var(--green); color:#fff; border:none;
  border-radius:10px; font-size:15px; font-weight:700; cursor:pointer; margin-top:18px;
}
.btn-guardar:hover { opacity:.9; }
.btn-guardar:disabled { opacity:.5; cursor:not-allowed; }
#scanner-wrap { border-radius:12px; overflow:hidden; margin:12px 0; background:#000; min-height:200px; }
.notif-existe { background:rgba(234,179,8,.12); border:1px solid var(--yellow); border-radius:10px; padding:12px 14px; font-size:13px; color:var(--yellow); margin:12px 0; }
.notif-nuevo  { background:rgba(34,197,94,.1); border:1px solid var(--green); border-radius:10px; padding:12px 14px; font-size:13px; color:var(--green); margin:12px 0; }
.cat-table { width:100%; border-collapse:collapse; font-size:12px; margin-top:16px; }
.cat-table th { background:var(--bg3); color:var(--text2); padding:7px 10px; text-align:left; font-size:11px; text-transform:uppercase; letter-spacing:.04em; }
.cat-table td { padding:7px 10px; border-bottom:1px solid var(--border); color:var(--text); vertical-align:middle; }
.cat-table tr:last-child td { border-bottom:none; }
.cat-badge { display:inline-block; padding:2px 8px; border-radius:8px; font-size:10px; font-weight:700; background:var(--bg3); color:var(--text2); }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">🏪</div>
    <div class="login-title">Dona Superadmin</div>
    <div class="login-sub">Panel de control interno</div>
    <input type="password" id="inp-secret" placeholder="Contraseña de acceso" autocomplete="current-password">
    <button class="btn-login" onclick="entrar()">Entrar</button>
    <div id="login-error">Contraseña incorrecta</div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="topbar">
    <div class="topbar-brand">
      <span class="topbar-logo">🏪</span>
      <span class="topbar-title">Dona Superadmin</span>
      <span class="topbar-badge">INTERNO</span>
    </div>
    <div class="tab-nav" id="tab-nav" style="display:none">
      <button class="tab-btn active" id="tab-dashboard" onclick="mostrarTab('dashboard')">📊 Dashboard</button>
      <button class="tab-btn" id="tab-catalogo" onclick="mostrarTab('catalogo')">🏷️ Catálogo</button>
    </div>
    <div class="topbar-right">
      <span class="last-update" id="last-update"></span>
      <button class="btn-refresh" id="btn-actualizar" onclick="cargarDatos()">↻ Actualizar</button>
      <button class="btn-refresh" onclick="cerrarSesionAdmin()" style="color:#ef4444;border-color:#ef4444">⏻ Salir</button>
    </div>
  </div>

  <div class="content" id="content">
    <div class="spinner-wrap"><div class="spinner"></div></div>
  </div>
</div>

<script>
const API = '/api/admin';
let secretGuardado = '';
let keepaliveInterval = null;

document.getElementById('inp-secret').addEventListener('keydown', e => {
  if (e.key === 'Enter') entrar();
});

// Keepalive: ping a /api/chat cada 4 minutos para evitar cold start
function iniciarKeepalive() {
  if (keepaliveInterval) return;
  keepaliveInterval = setInterval(async () => {
    try {
      await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action: 'ping' }),
      });
      document.getElementById('last-update').textContent =
        'Servidor activo · ' + new Date().toLocaleTimeString('es-PE');
    } catch {}
  }, 4 * 60 * 1000); // cada 4 minutos
}

function detenerKeepalive() {
  if (keepaliveInterval) { clearInterval(keepaliveInterval); keepaliveInterval = null; }
}

function cerrarSesionAdmin() {
  detenerKeepalive();
  pararScanner();
  secretGuardado = '';
  document.getElementById('app').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('tab-nav').style.display = 'none';
  document.getElementById('inp-secret').value = '';
  document.getElementById('content').innerHTML = '';
}

// ─── Tabs ────────────────────────────────────────────────────────────────────
let tabActual = 'dashboard';
function mostrarTab(tab) {
  tabActual = tab;
  document.getElementById('tab-dashboard').classList.toggle('active', tab === 'dashboard');
  document.getElementById('tab-catalogo').classList.toggle('active', tab === 'catalogo');
  const btnAct = document.getElementById('btn-actualizar');
  if (tab === 'dashboard') {
    btnAct.style.display = '';
    cargarDatos();
  } else {
    btnAct.style.display = 'none';
    pararScanner();
    renderCatalogo();
  }
}

// ─── Catálogo Global ─────────────────────────────────────────────────────────
let scanner = null;
let scannerActivo = false;

async function apiAdmin(action, extra = {}) {
  const res = await fetch(API, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ secret: secretGuardado, action, ...extra }),
  });
  return res.json();
}

async function renderCatalogo() {
  document.getElementById('content').innerHTML = `
    <div class="section-title">Catálogo Global de Productos</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;max-width:900px">

      <!-- Panel Scanner + Formulario -->
      <div class="cat-card">
        <div style="font-size:14px;font-weight:700;margin-bottom:14px">➕ Registrar producto</div>

        <button class="btn-scan" onclick="toggleScanner()">
          <span id="scan-icon">📷</span>
          <span id="scan-label">Abrir cámara y escanear</span>
        </button>

        <div id="scanner-wrap" style="display:none"></div>

        <div class="cat-form">
          <label>Código de barras *</label>
          <input id="cat-codigo" type="text" placeholder="Ej: 7751040017492"
            oninput="verificarCodigo(this.value)">

          <div id="cat-notif" style="display:none"></div>

          <label>Nombre del producto *</label>
          <input id="cat-nombre" type="text" placeholder="Ej: Coca Cola 500ml">

          <label>Marca</label>
          <input id="cat-marca" type="text" placeholder="Ej: Coca Cola">

          <label>Categoría</label>
          <select id="cat-cat">
            <option value="bebidas">Bebidas</option>
            <option value="abarrotes">Abarrotes</option>
            <option value="snacks">Snacks</option>
            <option value="lacteos">Lácteos</option>
            <option value="limpieza">Limpieza</option>
            <option value="panaderia">Panadería</option>
            <option value="general" selected>General</option>
          </select>

          <label>Unidad</label>
          <select id="cat-unidad">
            <option value="unidad" selected>Unidad</option>
            <option value="botella">Botella</option>
            <option value="lata">Lata</option>
            <option value="bolsa">Bolsa</option>
            <option value="caja">Caja</option>
            <option value="paquete">Paquete</option>
            <option value="kg">Kilogramo</option>
            <option value="litro">Litro</option>
          </select>

          <button class="btn-guardar" id="btn-guardar-cat" onclick="guardarEnCatalogo()">
            💾 Guardar en catálogo
          </button>
        </div>
      </div>

      <!-- Panel Stats + Lista -->
      <div style="display:flex;flex-direction:column;gap:16px">
        <div class="cat-card" id="cat-stats">
          <div style="font-size:13px;color:var(--text2)">Cargando estadísticas...</div>
        </div>
        <div class="cat-card" style="overflow:auto;max-height:480px">
          <div style="font-size:14px;font-weight:700;margin-bottom:12px">📋 Últimos registrados</div>
          <div id="cat-lista">Cargando...</div>
        </div>
      </div>

    </div>`;

  cargarListaCatalogo();
}

async function cargarListaCatalogo() {
  const data = await apiAdmin('listarCatalogo');
  if (!data.ok) return;

  const items = data.items || [];
  document.getElementById('cat-stats').innerHTML = `
    <div style="font-size:28px;font-weight:800;color:var(--orange)">${items.length >= 50 ? '50+' : items.length}</div>
    <div style="font-size:12px;color:var(--text2);margin-top:2px">productos en catálogo global</div>`;

  if (items.length === 0) {
    document.getElementById('cat-lista').innerHTML = '<div style="color:var(--text3);font-size:13px">Sin productos aún — ¡sé el primero en agregar!</div>';
    return;
  }

  document.getElementById('cat-lista').innerHTML = `
    <table class="cat-table">
      <thead><tr>
        <th>Código</th><th>Nombre</th><th>Marca</th><th>Categoría</th><th>Unidad</th>
      </tr></thead>
      <tbody>
        ${items.map(p => `<tr>
          <td style="font-family:monospace;font-size:11px;color:var(--text3)">${p.codigo_barras}</td>
          <td style="font-weight:600">${p.nombre}</td>
          <td style="color:var(--text2)">${p.marca || '—'}</td>
          <td><span class="cat-badge">${p.categoria || 'general'}</span></td>
          <td style="color:var(--text2)">${p.unidad || 'unidad'}</td>
        </tr>`).join('')}
      </tbody>
    </table>`;
}

let verificarTimeout = null;
function verificarCodigo(codigo) {
  clearTimeout(verificarTimeout);
  if (!codigo || codigo.length < 6) {
    document.getElementById('cat-notif').style.display = 'none';
    return;
  }
  verificarTimeout = setTimeout(() => buscarCodigo(codigo), 600);
}

async function buscarCodigo(codigo) {
  const data = await apiAdmin('buscarCatalogo', { codigo_barras: codigo });
  const notif = document.getElementById('cat-notif');
  if (data.encontrado && data.producto) {
    const p = data.producto;
    notif.className = 'notif-existe';
    notif.innerHTML = `⚠️ <strong>Ya registrado:</strong> ${p.nombre}${p.marca ? ' · ' + p.marca : ''} · ${p.categoria} · ${p.unidad}`;
    notif.style.display = 'block';
    // Pre-cargar datos para editar
    document.getElementById('cat-nombre').value = p.nombre;
    document.getElementById('cat-marca').value = p.marca || '';
    document.getElementById('cat-cat').value = p.categoria || 'general';
    document.getElementById('cat-unidad').value = p.unidad || 'unidad';
    document.getElementById('btn-guardar-cat').textContent = '✏️ Actualizar en catálogo';
  } else {
    notif.className = 'notif-nuevo';
    notif.innerHTML = '🆕 Código nuevo — completa los datos para registrarlo';
    notif.style.display = 'block';
    document.getElementById('btn-guardar-cat').textContent = '💾 Guardar en catálogo';
  }
}

async function guardarEnCatalogo() {
  const codigo = document.getElementById('cat-codigo').value.trim();
  const nombre = document.getElementById('cat-nombre').value.trim();
  if (!codigo || !nombre) {
    alert('El código y el nombre son obligatorios.');
    return;
  }
  const btn = document.getElementById('btn-guardar-cat');
  btn.disabled = true; btn.textContent = 'Guardando...';

  const data = await apiAdmin('guardarCatalogo', {
    codigo_barras: codigo, nombre,
    marca: document.getElementById('cat-marca').value.trim() || null,
    categoria: document.getElementById('cat-cat').value,
    unidad: document.getElementById('cat-unidad').value,
  });

  btn.disabled = false;
  if (data.ok) {
    btn.textContent = '✅ Guardado';
    setTimeout(() => {
      // Limpiar formulario
      ['cat-codigo','cat-nombre','cat-marca'].forEach(id => document.getElementById(id).value = '');
      document.getElementById('cat-notif').style.display = 'none';
      document.getElementById('btn-guardar-cat').textContent = '💾 Guardar en catálogo';
      cargarListaCatalogo();
    }, 1200);
  } else {
    btn.textContent = '❌ Error — intenta de nuevo';
    setTimeout(() => { btn.textContent = '💾 Guardar en catálogo'; }, 2000);
  }
}

function toggleScanner() {
  if (scannerActivo) { pararScanner(); return; }
  iniciarScanner();
}

function iniciarScanner() {
  const wrap = document.getElementById('scanner-wrap');
  wrap.style.display = 'block';
  wrap.innerHTML = `
    <div id="qr-reader" style="width:100%"></div>
    <div style="text-align:center;font-size:11px;color:#94a3b8;padding:6px 0 8px">
      📦 Centra el código de barras horizontalmente en la línea roja
    </div>`;
  document.getElementById('scan-icon').textContent = '⏹';
  document.getElementById('scan-label').textContent = 'Detener cámara';

  // Formatos de código de barras de productos (EAN-13 es el estándar peruano)
  const formatos = [
    Html5QrcodeSupportedFormats.EAN_13,
    Html5QrcodeSupportedFormats.EAN_8,
    Html5QrcodeSupportedFormats.UPC_A,
    Html5QrcodeSupportedFormats.UPC_E,
    Html5QrcodeSupportedFormats.CODE_128,
    Html5QrcodeSupportedFormats.CODE_39,
    Html5QrcodeSupportedFormats.ITF,
    Html5QrcodeSupportedFormats.QR_CODE,
  ];

  scanner = new Html5Qrcode('qr-reader', { formatsToSupport: formatos, verbose: false });
  scannerActivo = true;

  // Calcular qrbox según el ancho real disponible
  const anchoDisp = wrap.offsetWidth || 320;
  const qrW = Math.min(anchoDisp - 40, 300);

  scanner.start(
    { facingMode: 'environment' },
    {
      fps: 15,
      qrbox: { width: qrW, height: Math.round(qrW * 0.35) }, // rect horizontal para barcode
      aspectRatio: 2.5,
    },
    (codigo) => {
      document.getElementById('cat-codigo').value = codigo;
      buscarCodigo(codigo);
      pararScanner();
    },
    () => {}
  ).catch((err) => {
    wrap.innerHTML = '<div style="color:#ef4444;padding:16px;font-size:13px">❌ No se pudo acceder a la cámara. Verifica los permisos del navegador.</div>';
    console.error('Scanner error:', err);
    scannerActivo = false;
  });
}

function pararScanner() {
  if (scanner && scannerActivo) {
    scanner.stop().catch(() => {});
    scanner = null;
  }
  scannerActivo = false;
  const wrap = document.getElementById('scanner-wrap');
  if (wrap) { wrap.style.display = 'none'; wrap.innerHTML = ''; }
  const icon = document.getElementById('scan-icon');
  const label = document.getElementById('scan-label');
  if (icon) icon.textContent = '📷';
  if (label) label.textContent = 'Abrir cámara y escanear';
}

async function entrar() {
  const secret = document.getElementById('inp-secret').value.trim();
  if (!secret) return;
  const errEl = document.getElementById('login-error');
  errEl.style.display = 'none';

  try {
    const res = await fetch(API, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ secret, action: 'dashboard' }),
    });
    const data = await res.json();
    if (!data.ok) {
      errEl.style.display = 'block';
      return;
    }
    secretGuardado = secret;
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    document.getElementById('tab-nav').style.display = 'flex';
    renderDashboard(data);
    document.getElementById('last-update').textContent = 'Actualizado: ' + new Date().toLocaleTimeString('es-PE');
    iniciarKeepalive();
  } catch {
    errEl.style.display = 'block';
    errEl.textContent = 'Error de conexión';
  }
}

async function cargarDatos() {
  document.getElementById('content').innerHTML = '<div class="spinner-wrap"><div class="spinner"></div></div>';
  try {
    const res = await fetch(API, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ secret: secretGuardado, action: 'dashboard' }),
    });
    const data = await res.json();
    if (data.ok) {
      renderDashboard(data);
      document.getElementById('last-update').textContent = 'Actualizado: ' + new Date().toLocaleTimeString('es-PE');
    }
  } catch {}
}

const MEDALLAS = ['🥇', '🥈', '🥉'];
const COLORES_MEDALLA = ['#f59e0b', '#94a3b8', '#cd7c2f'];

function renderRanking(titulo, tiendas, campo, formatVal, color) {
  const sorted = [...tiendas]
    .filter(t => parseFloat(t[campo]) > 0)
    .sort((a, b) => parseFloat(b[campo]) - parseFloat(a[campo]))
    .slice(0, 3);
  if (sorted.length === 0) return `<div class="ranking-card"><div class="ranking-title">${titulo}</div><div class="empty" style="padding:16px">Sin datos aún</div></div>`;
  return `
    <div class="ranking-card">
      <div class="ranking-title">${titulo}</div>
      ${sorted.map((t, i) => `
        <div class="podio-item">
          <div class="podio-pos">${MEDALLAS[i] || (i+1)+'°'}</div>
          <div class="podio-info">
            <div class="podio-nombre">${t.nombre}</div>
            <div class="podio-valor">@${t.propietario}</div>
          </div>
          <div class="podio-badge" style="color:${i === 0 ? color : 'var(--text2)'}">${formatVal(t[campo])}</div>
        </div>`).join('')}
    </div>`;
}

function renderRankingCrecimiento(tiendas) {
  const sorted = [...tiendas]
    .filter(t => parseFloat(t.montoSemana) > 0)
    .sort((a, b) => b.crecimiento - a.crecimiento)
    .slice(0, 3);
  if (sorted.length === 0) return `<div class="ranking-card"><div class="ranking-title">🚀 Más crecimiento</div><div class="empty" style="padding:16px">Sin datos aún</div></div>`;
  return `
    <div class="ranking-card">
      <div class="ranking-title">🚀 Más crecimiento (semana)</div>
      ${sorted.map((t, i) => {
        const c = t.crecimiento;
        const color = c > 0 ? 'var(--green)' : c < 0 ? 'var(--red)' : 'var(--text2)';
        const signo = c > 0 ? '+' : '';
        return `
        <div class="podio-item">
          <div class="podio-pos">${MEDALLAS[i] || (i+1)+'°'}</div>
          <div class="podio-info">
            <div class="podio-nombre">${t.nombre}</div>
            <div class="podio-valor">S/${parseFloat(t.montoSemana).toFixed(2)} esta semana</div>
          </div>
          <div class="podio-badge" style="color:${color}">${signo}${c}%</div>
        </div>`;
      }).join('')}
    </div>`;
}

function fmt(n) { return 'S/' + parseFloat(n).toFixed(2); }
function fmtNum(n) { return Number(n).toLocaleString('es-PE'); }

function tiempoRelativo(fecha) {
  if (!fecha) return '—';
  const diff = Date.now() - new Date(fecha);
  const min = Math.floor(diff / 60000);
  if (min < 60) return `hace ${min}m`;
  const hrs = Math.floor(min / 60);
  if (hrs < 24) return `hace ${hrs}h`;
  const dias = Math.floor(hrs / 24);
  return `hace ${dias}d`;
}

// ─── Acciones sobre tiendas ──────────────────────────────────────────────────
let _accionPendiente = null;

function accionTienda(tipo, tienda_id, nombre) {
  _accionPendiente = { tipo, tienda_id, nombre };
  const modal = document.getElementById('modal-accion');
  const titulo = document.getElementById('modal-accion-titulo');
  const desc   = document.getElementById('modal-accion-desc');
  const btnOk  = document.getElementById('modal-accion-btn');
  const inp    = document.getElementById('modal-accion-inp');

  if (tipo === 'desactivar') {
    titulo.textContent = '⏸ Desactivar bodega';
    desc.innerHTML = `Se desactivará <strong>${nombre}</strong> y todos sus usuarios. Nadie podrá entrar. Los datos se conservan y se puede reactivar después.`;
    btnOk.textContent = 'Sí, desactivar';
    btnOk.style.background = 'var(--yellow)';
  } else {
    titulo.textContent = '🗑 Eliminar bodega';
    desc.innerHTML = `<span style="color:var(--red);font-weight:700">¡Esta acción es IRREVERSIBLE!</span><br>Se borrarán <strong>todos los datos</strong> de <strong>${nombre}</strong>: productos, ventas, fiados e historial. No hay forma de recuperarlos.`;
    btnOk.textContent = 'Sí, ELIMINAR todo';
    btnOk.style.background = 'var(--red)';
  }

  inp.value = '';
  inp.placeholder = `Escribe: ${nombre}`;
  document.getElementById('modal-accion-error').style.display = 'none';
  modal.style.display = 'flex';
}

function cerrarModalAccion() {
  document.getElementById('modal-accion').style.display = 'none';
  _accionPendiente = null;
}

async function confirmarAccionTienda() {
  if (!_accionPendiente) return;
  const inp = document.getElementById('modal-accion-inp').value.trim();
  const errEl = document.getElementById('modal-accion-error');

  if (inp !== _accionPendiente.nombre) {
    errEl.textContent = 'El nombre no coincide. Escríbelo exactamente como aparece.';
    errEl.style.display = 'block';
    return;
  }

  const btn = document.getElementById('modal-accion-btn');
  btn.disabled = true;
  btn.textContent = 'Procesando...';

  try {
    const res = await fetch(API, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ secret: secretGuardado, action: _accionPendiente.tipo === 'desactivar' ? 'desactivarTienda' : 'eliminarTienda', tienda_id: _accionPendiente.tienda_id }),
    });
    const data = await res.json();
    if (data.ok) {
      cerrarModalAccion();
      cargarDatos();
    } else {
      errEl.textContent = data.error || 'Error al procesar';
      errEl.style.display = 'block';
    }
  } catch {
    errEl.textContent = 'Error de conexión';
    errEl.style.display = 'block';
  } finally {
    btn.disabled = false;
    btn.textContent = _accionPendiente?.tipo === 'desactivar' ? 'Sí, desactivar' : 'Sí, ELIMINAR todo';
  }
}
</script>
